<html>
  <head>
    <title>xxx</title>
  </head>
  <body onstart="">
    <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
      .circle {
        position: relative;
        width: 100px;
        height: 100px;
        -webkit-border-radius: 50%;
        border-radius: 50%;
        background-color: darkgray;
        overflow: hidden;
        transition: transform 1s ease-in-out;
      }
      
      .circle:hover {
        -webkit-transform: scale(2);
        transform: scale(2);
        will-change: transform;
      }
      
      .circle::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(0deg, rgba(150, 60, 71, 0.9), rgba(100, 150, 70, 1));
      }
      
    </style>
    <div class="circle"></div>
  </body>
</html>
